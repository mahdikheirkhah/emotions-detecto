# =============================================================
# Emotions Detecto — Ablation-Driven Configuration
# =============================================================
# Every value has an `# options:` comment listing all valid
# choices. Change exactly ONE value at a time to run an
# ablation. Never hardcode a decision in source code.

# ===== Global =====
global:
  seed: 42                         # options: any integer — fixes numpy/tf/random for reproducibility
  log_level: "INFO"                # options: DEBUG | INFO | WARNING | ERROR

# ===== Dataset =====
# Zip extracts to:
#   train.csv              — emotion, pixels              (no split column; all training rows)
#   test.csv               — pixels only                  (unlabelled, not used in pipeline)
#   test_with_emotions.csv — emotion, pixels              (held-out evaluation set)
#   icml_face_data.csv     — emotion, usage, pixels       (has Training/PublicTest/PrivateTest split column)
#   fer2013.tar.gz         → fer2013/fer2013.csv          (same schema as icml_face_data.csv)
data:
  url: "https://assets.01-edu.org/ai-branch/project3/emotions-detector.zip"
  zip_name: "emotions-detector.zip"
  expected_files:          # minimum files verified after extraction
    - "train.csv"
    - "test.csv"
    - "test_with_emotions.csv"
    - "icml_face_data.csv"
  primary_csv: "icml_face_data.csv"  # split-aware file: emotion + usage + pixels
  train_csv: "train.csv"             # flat training file: emotion + pixels (no Usage col)
  test_csv: "test_with_emotions.csv" # held-out evaluation: emotion + pixels

# ===== Paths =====
paths:
  data_dir: "data/"
  results_dir: "results/"
  model_dir: "results/model/"
  preprocessing_test_dir: "results/preprocessing_test/"
  logs_dir: "logs/"
  model_save_path: "results/model/final_emotion_model.keras"
  arch_txt_path: "results/model/architecture.txt"
  learning_curves_path: "results/model/learning_curves.png"
  tensorboard_dir: "logs/tensorboard/"

# ===== Pipeline stage toggles (ablation switches) =====
# Set a stage to false to measure what it contributes to accuracy.
stages:
  cleaning: true          # options: true | false
  preprocessing: true     # options: true | false
  augmentation: true      # options: true | false  (off = raw-pixel baseline)
  decomposition: false    # options: true | false  (PCA; usually off for a CNN)
  face_detection: true    # options: true | false
  train: true             # options: true | false
  evaluate: true          # options: true | false
  tuning: false           # options: true | false

# ===== Data cleaning =====
# Each option fixes a numbered problem from data.md §2; see data.md §3 for the
# rationale (options weighed, decision, why) behind every value below.
cleaning:
  # --- Duplicates & leakage (P2.2 cross-split, P2.3 within-split) ---
  remove_duplicates: true       # options: true | false  — drop exact-duplicate images (MD5 of pixel bytes)
  dedup_scope: "global"         # options: global | per_split
                                #   global    = dedup across ALL splits BEFORE splitting → removes leakage
                                #   per_split = dedup within each split only → leakage NOT removed (baseline)

  # --- Degenerate / non-face images (P2.5, P2.6) ---
  drop_constant_images: true    # options: true | false  — drop std==0 blank/black frames (the 11 found)
  min_contrast: 0               # options: 0 | 5 | 10     — also drop images with std below this (0 = keep all)
  drop_non_faces: false         # options: true | false   — heuristic text/graphic removal (edge-dense + bright);
                                #   OFF by default: risks false positives on legitimately high-detail faces

  # --- Class imbalance (P2.1) ---
  handle_imbalance: true              # options: true | false
  imbalance_strategy: "class_weight"  # options: none | class_weight | oversample | undersample
                                      #   (top ablation candidate — see data.md §3.2)

  # --- Label noise (P2.7) ---
  # No switch: residual label noise is ACCEPTED (data.md §3.6). Fought with early
  # stopping + macro-F1, not by dropping ambiguous rows (over-cleaning risk).

# ===== Preprocessing / feature engineering =====
preprocessing:
  image_size: 48                   # options: 48 | 64 | 96  (FER-2013 native is 48)
  grayscale: true                  # options: true | false
  normalization: "rescale"         # options: none | rescale | standardize | histogram_eq | clahe
  histogram_equalization: false    # options: true | false  (applied before normalization)
  clahe_clip_limit: 2.0            # options: 1.0 | 2.0 | 4.0  (CLAHE contrast clip; clahe only)
  clahe_tile_grid: 8               # options: 4 | 8 | 16       (CLAHE N×N tile grid; clahe only)

# ===== Data augmentation =====
augmentation:
  strategy: "basic"                # options: basic | heavy | none
  horizontal_flip: true            # options: true | false
  rotation_range: 10               # options: 0 | 5 | 10 | 15
  zoom_range: 0.1                  # options: 0.0 | 0.1 | 0.2
  width_shift_range: 0.1           # options: 0.0 | 0.1 | 0.2
  height_shift_range: 0.1          # options: 0.0 | 0.1 | 0.2

# ===== Data decomposition (dimensionality reduction) =====
# OFF by default: a CNN needs the raw 48×48 spatial layout PCA would destroy.
# Turn on only for the linear/logistic baseline or as a teaching ablation (data.md §6).
decomposition:
  method: "pca"                    # options: pca
  n_components: 0.95               # options: 0.95 | 0.99 | 50 | 100
                                   #   float in (0,1) = keep that fraction of variance;
                                   #   int = keep exactly that many components

# ===== Train / validation / test split =====
# Test is FIXED by the Usage column (PublicTest + PrivateTest = test_with_emotions.csv);
# validation is carved stratified out of the Training rows. Split is seeded + fixed so
# every ablation trains/evaluates on identical data (data.md §7 / CONTRIBUTING §8).
split:
  val_size: 0.2                    # options: 0.1 | 0.15 | 0.2  (fraction of Training used for validation)
  stratify: true                   # options: true | false     (preserve per-class ratios in train/val)

# ===== tf.data input pipeline =====
pipeline:
  shuffle_buffer: 1024             # options: 512 | 1024 | 4096  (train-only shuffle buffer)
  cache: true                      # options: true | false      (cache slices in memory before shuffle)

# ===== Model =====
model:
  architecture: "vgg_small"        # options: simple_cnn | vgg_small | resnet_mini | transfer_vgg16
  optimizer: "adam"                # options: adam | sgd | rmsprop
  learning_rate: 0.001             # options: 0.01 | 0.001 | 0.0001
  batch_size: 64                   # options: 32 | 64 | 128
  epochs: 100                      # options: any integer
  dropout_rate: 0.5                # options: 0.3 | 0.4 | 0.5
  num_conv_blocks: 3               # options: 2 | 3 | 4
  filters_start: 32                # options: 32 | 64
  kernel_size: 3                   # options: 3 | 5   (conv kernel; VGG uses 3x3)
  convs_per_block: 2               # options: 1 | 2 | 3  (stacked convs before each pool)
  loss: "categorical_crossentropy" # options: categorical_crossentropy | focal_loss
  num_classes: 7                   # fixed: Happy/Sad/Angry/Surprise/Fear/Disgust/Neutral

# ===== Callbacks =====
callbacks:
  early_stopping_patience: 10      # options: 5 | 10 | 15
  reduce_lr_patience: 5            # options: 3 | 5 | 7
  reduce_lr_factor: 0.5            # options: 0.2 | 0.5
  min_lr: 0.000001                 # options: any small float

# ===== Hyperparameter tuning =====
tuning:
  strategy: "random"               # options: random | bayesian | hyperband
  max_trials: 10                   # options: any integer
  executions_per_trial: 1          # options: 1 | 2 | 3
  tuning_dir: "logs/tuning/"

# ===== Evaluation =====
evaluation:
  metrics:                         # options per item: accuracy | f1_macro | confusion_matrix | roc_auc
    - "accuracy"
    - "f1_macro"
    - "confusion_matrix"
  cross_validation: false          # options: true | false
  cv_folds: 5                      # options: 3 | 5 | 10

# ===== Face detection =====
face_detector:
  backend: "haar"                  # options: haar | dnn
  haar_cascade: "haarcascade_frontalface_default.xml"
  dnn_prototxt: "models/deploy.prototxt"
  dnn_model: "models/res10_300x300_ssd_iter_140000.caffemodel"
  scale_factor: 1.1                # options: 1.05 | 1.1 | 1.3
  min_neighbors: 5                 # options: 3 | 5 | 7
  min_size: [30, 30]               # options: [24,24] | [30,30] | [48,48]
  confidence_threshold: 0.5        # options: 0.3 | 0.5 | 0.7  (dnn backend only)

# ===== Video / live stream =====
video:
  source: 0                        # options: 0 (webcam) | "path/to/video.mp4"
  frame_skip: 2                    # options: 1 | 2 | 5  (process every Nth frame)
  display_fps: true                # options: true | false
  window_title: "Emotion Detector"
