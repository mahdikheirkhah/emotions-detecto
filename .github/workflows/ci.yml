name: CI

# Enforce formatting + tests on every push and pull request (CONTRIBUTING.md §1/§9),
# so the project stays green and no regression or unformatted code lands unnoticed.
on:
  push:
  pull_request:

jobs:
  black-and-pytest:
    name: Black + pytest
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
        # Git LFS is not pulled: the tests fake the model, so the .keras pointer suffices.

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install OpenCV's system libraries
        # opencv-python needs libGL / libglib at import; without them cv2 fails to load
        # and the functional preprocessing_test would silently skip instead of running.
        run: sudo apt-get update && sudo apt-get install -y libgl1 libglib2.0-0

      - name: Install dependencies (locked) + Black
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "black>=26.5.1,<27"

      - name: Check formatting (Black)
        run: black --check .

      - name: Run the test suite (pytest)
        run: pytest -q
